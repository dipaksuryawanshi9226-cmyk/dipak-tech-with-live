<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>लॉगिन - राज कोर्सेस</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#2563eb,#06b6d4);
}

.container{
background:white;
padding:30px;
width:350px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button:hover{
opacity:.9;
}
</style>
</head>
<body>

<div class="container">

<h2>विद्यार्थी लॉगिन</h2>

<input type="text" id="name" placeholder="पूर्ण नाव">

<input type="tel" id="mobile" placeholder="मोबाईल नंबर">

<input type="email" id="email" placeholder="ईमेल">

<input type="password" id="password" placeholder="पासवर्ड">

<button onclick="registerUser()">नोंदणी करा</button>

<button onclick="loginUser()">लॉगिन करा</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

/* तुमचा Firebase Config येथे टाका */

const firebaseConfig = {

apiKey: "YOUR_API_KEY",

authDomain: "YOUR_PROJECT.firebaseapp.com",

projectId: "YOUR_PROJECT_ID",

storageBucket: "YOUR_PROJECT.appspot.com",

messagingSenderId: "XXXXXXXX",

appId: "XXXXXXXX"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.registerUser = function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)

.then(() => {

alert("नोंदणी यशस्वी");

})

.catch((error)=>{

alert(error.message);

});

}

window.loginUser = function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)

.then(() => {

alert("लॉगिन यशस्वी");

window.location.href="index.html";

})

.catch((error)=>{

alert(error.message);

});

}

</script>

</body>
</html>
